server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 前端靜態頁面
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 允許大檔案上傳（20MB）
    client_max_body_size 20M;

    gzip on;
    gzip_types text/html text/css application/javascript;
}
