<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR 文字辨識系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a24;
    --surface2: #1e2330;
    --border: #2a3040;
    --accent: #4f9cf9;
    --accent2: #7c3aed;
    --success: #22c55e;
    --warning: #f59e0b;
    --text: #e8eaf0;
    --text-muted: #8892a4;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,156,249,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,156,249,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    width: 100%;
    padding: 28px 40px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    background: rgba(13,15,20,0.8);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  header span {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  main {
    width: 100%;
    max-width: 900px;
    padding: 48px 24px;
    position: relative;
    z-index: 1;
  }

  .hero {
    text-align: center;
    margin-bottom: 48px;
  }

  .hero h2 {
    font-size: 36px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--text) 40%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
    line-height: 1.2;
  }

  .hero p {
    color: var(--text-muted);
    font-size: 15px;
    font-weight: 300;
  }

  /* Upload Zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 56px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .upload-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(79,156,249,0.06) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .upload-zone:hover::before,
  .upload-zone.dragover::before { opacity: 1; }

  .upload-zone:hover,
  .upload-zone.dragover {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .upload-icon {
    font-size: 52px;
    margin-bottom: 16px;
    display: block;
    filter: drop-shadow(0 0 20px rgba(79,156,249,0.3));
  }

  .upload-zone h3 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .upload-zone p {
    color: var(--text-muted);
    font-size: 13px;
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  /* Preview */
  .preview-area {
    display: none;
    margin-top: 24px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .preview-area.show { display: block; }

  .preview-header {
    padding: 14px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .preview-header .filename {
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .preview-body {
    padding: 20px;
    display: flex;
    justify-content: center;
  }

  .preview-body img {
    max-width: 100%;
    max-height: 320px;
    border-radius: 8px;
    object-fit: contain;
  }

  /* Button */
  .btn-ocr {
    width: 100%;
    margin-top: 20px;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius);
    color: white;
    font-size: 16px;
    font-weight: 600;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-ocr:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(79,156,249,0.35);
  }

  .btn-ocr:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Progress */
  .progress-bar {
    display: none;
    margin-top: 16px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar.show { display: block; }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.3s ease;
    animation: shimmer 1.5s infinite;
  }

  @keyframes shimmer {
    0% { background-position: -200px 0; }
    100% { background-position: 200px 0; }
  }

  .status-msg {
    text-align: center;
    margin-top: 12px;
    font-size: 13px;
    color: var(--text-muted);
    display: none;
    font-family: 'JetBrains Mono', monospace;
  }
  .status-msg.show { display: block; }

  /* Result Card */
  .result-card {
    display: none;
    margin-top: 32px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    animation: slideUp 0.4s ease;
  }

  .result-card.show { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding: 16px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .result-header .badge {
    background: rgba(34,197,94,0.15);
    color: var(--success);
    border: 1px solid rgba(34,197,94,0.3);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .result-header span { font-size: 14px; font-weight: 500; }

  .result-body {
    padding: 20px;
  }

  .result-body label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 8px;
    margin-top: 18px;
  }

  .result-body label:first-child { margin-top: 0; }

  .ocr-text {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
    color: #a8c8f0;
  }

  .ocr-text::-webkit-scrollbar { width: 6px; }
  .ocr-text::-webkit-scrollbar-track { background: var(--border); border-radius: 3px; }
  .ocr-text::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

  .download-btns {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }

  .btn-download {
    flex: 1;
    padding: 12px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
  }

  .btn-download:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(79,156,249,0.06);
    transform: translateY(-1px);
  }

  .btn-download.primary {
    background: linear-gradient(135deg, rgba(79,156,249,0.15), rgba(124,58,237,0.15));
    border-color: rgba(79,156,249,0.4);
    color: var(--accent);
  }

  /* Error */
  .error-msg {
    display: none;
    margin-top: 16px;
    padding: 14px 16px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    color: #f87171;
    font-size: 13px;
  }
  .error-msg.show { display: block; }

  /* History */
  .history-section {
    margin-top: 56px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
  }

  .history-section h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 13px;
    transition: border-color 0.2s;
  }

  .history-item:hover { border-color: var(--border); }

  .history-item .icon { font-size: 20px; flex-shrink: 0; }
  .history-item .info { flex: 1; min-width: 0; }
  .history-item .info .name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .history-item .info .meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .history-item .btn-dl {
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .history-item .btn-dl:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .empty-history {
    text-align: center;
    padding: 32px;
    color: var(--text-muted);
    font-size: 13px;
  }

  footer {
    width: 100%;
    text-align: center;
    padding: 24px;
    color: var(--text-muted);
    font-size: 12px;
    border-top: 1px solid var(--border);
    margin-top: auto;
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>

<header>
  <div class="logo">🔍</div>
  <h1>OCR 文字辨識系統</h1>
  <span>v1.0 · Tesseract Engine</span>
</header>

<main>
  <div class="hero">
    <h2>上傳圖片，即刻辨識文字</h2>
    <p>支援繁體中文、簡體中文、英文 · JPG / PNG / BMP / TIFF</p>
  </div>

  <!-- Upload -->
  <div class="upload-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.bmp,.tiff,.tif,.webp">
    <span class="upload-icon">📷</span>
    <h3>拖曳圖片到此處，或點擊選擇</h3>
    <p>最大支援 20MB · 辨識結果將自動打包為 ZIP 下載</p>
  </div>

  <!-- Image Preview -->
  <div class="preview-area" id="previewArea">
    <div class="preview-header">
      <span>預覽</span>
      <span class="filename" id="previewFilename"></span>
    </div>
    <div class="preview-body">
      <img id="previewImg" src="" alt="預覽">
    </div>
  </div>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="status-msg" id="statusMsg"></div>
  <div class="error-msg" id="errorMsg"></div>

  <button class="btn-ocr" id="ocrBtn" disabled onclick="startOCR()">
    <span id="btnIcon">🚀</span>
    <span id="btnText">開始辨識</span>
  </button>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <span class="badge">✓ 辨識完成</span>
      <span id="resultFilename"></span>
    </div>
    <div class="result-body">
      <label>辨識結果</label>
      <div class="ocr-text" id="ocrResult"></div>

      <div class="download-btns">
        <a class="btn-download primary" id="downloadZip" href="#" download>
          📦 下載完整包（圖片 + TXT）
        </a>
        <a class="btn-download" id="downloadTxt" href="#" download>
          📄 只下載 TXT
        </a>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="history-section">
    <h3>📋 歷史記錄</h3>
    <div id="historyList"><div class="empty-history">載入中...</div></div>
  </div>
</main>

<footer>OCR 辨識系統 · Oracle Cloud VM · Powered by Tesseract</footer>

<script>
  // 後端 API 地址 — 如果前後端在同一主機，用相對路徑即可
  const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:8000'
    : `http://${window.location.hostname}:8000`;

  let selectedFile = null;
  let currentResult = null;

  // ── 拖曳 ──
  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });

  function handleFile(file) {
    selectedFile = file;
    document.getElementById('ocrBtn').disabled = false;
    document.getElementById('previewFilename').textContent = file.name;
    document.getElementById('previewArea').classList.add('show');
    document.getElementById('resultCard').classList.remove('show');
    document.getElementById('errorMsg').classList.remove('show');

    const reader = new FileReader();
    reader.onload = e => { document.getElementById('previewImg').src = e.target.result; };
    reader.readAsDataURL(file);
  }

  // ── OCR ──
  async function startOCR() {
    if (!selectedFile) return;
    const btn = document.getElementById('ocrBtn');
    btn.disabled = true;
    document.getElementById('btnText').textContent = '辨識中...';
    document.getElementById('btnIcon').textContent = '⏳';
    document.getElementById('progressBar').classList.add('show');
    document.getElementById('statusMsg').classList.add('show');
    document.getElementById('statusMsg').textContent = '上傳圖片中...';
    document.getElementById('errorMsg').classList.remove('show');

    // 假進度動畫
    let prog = 0;
    const fill = document.getElementById('progressFill');
    const progTimer = setInterval(() => {
      prog = Math.min(prog + Math.random() * 8, 85);
      fill.style.width = prog + '%';
    }, 300);

    try {
      const formData = new FormData();
      formData.append('file', selectedFile);
      document.getElementById('statusMsg').textContent = 'OCR 辨識中，請稍候...';

      const res = await fetch(`${API}/ocr`, { method: 'POST', body: formData });
      clearInterval(progTimer);
      fill.style.width = '100%';

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || '伺服器錯誤');
      }

      const data = await res.json();
      currentResult = data;

      document.getElementById('statusMsg').textContent = '✅ 辨識完成！';
      showResult(data);
      loadHistory();
    } catch (err) {
      clearInterval(progTimer);
      document.getElementById('errorMsg').textContent = `❌ 錯誤：${err.message}`;
      document.getElementById('errorMsg').classList.add('show');
      document.getElementById('statusMsg').classList.remove('show');
    } finally {
      btn.disabled = false;
      document.getElementById('btnText').textContent = '重新辨識';
      document.getElementById('btnIcon').textContent = '🔄';
      setTimeout(() => { document.getElementById('progressBar').classList.remove('show'); }, 800);
    }
  }

  function showResult(data) {
    document.getElementById('resultCard').classList.add('show');
    document.getElementById('resultFilename').textContent = data.original_filename;
    document.getElementById('ocrResult').textContent = data.ocr_text || '（未辨識到文字）';
    document.getElementById('downloadZip').href = `${API}/download/zip/${data.zip_file}`;
    document.getElementById('downloadZip').download = data.zip_file;
    document.getElementById('downloadTxt').href = `${API}/download/txt/${data.txt_file}`;
    document.getElementById('downloadTxt').download = data.txt_file;
    document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── 歷史 ──
  async function loadHistory() {
    try {
      const res = await fetch(`${API}/list`);
      const data = await res.json();
      const list = document.getElementById('historyList');
      if (data.jobs.length === 0) {
        list.innerHTML = '<div class="empty-history">尚無辨識記錄</div>';
        return;
      }
      list.innerHTML = data.jobs.slice(0, 10).map(j => `
        <div class="history-item">
          <span class="icon">📦</span>
          <div class="info">
            <div class="name">${j.zip_file}</div>
            <div class="meta">${j.created} · ${j.size_kb} KB</div>
          </div>
          <button class="btn-dl" onclick="window.location='${API}/download/zip/${j.zip_file}'">下載</button>
        </div>
      `).join('');
    } catch {
      document.getElementById('historyList').innerHTML = '<div class="empty-history">無法載入歷史記錄</div>';
    }
  }

  loadHistory();
</script>
</body>
</html>
