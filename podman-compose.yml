version: "3.8"

services:
  # ── 後端 OCR API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocr-backend
    ports:
      - "8000:8000"
    volumes:
      # 掛載 VM 上的固定目錄 → 容器內的 /app/storage
      # 所有上傳的圖片和辨識結果會永久存在 VM 的 /opt/ocr-storage/
      - /opt/ocr-storage/uploads:/app/storage/uploads
      - /opt/ocr-storage/results:/app/storage/results
    environment:
      - STORAGE_PATH=/app/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── 前端 Nginx ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ocr-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend
